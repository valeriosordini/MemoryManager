<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>MemoryManager - VS</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h3>Tecnica di allocazione: First Fit</h3>
    
    <p>
    Il processo viene inserito nel primo blocco di memoria libero abbastanza grande.
    Se il blocco è più grande del necessario, lo spazio rimanente resta libero.
    </p>
    
    <label>Dimensione processo (MB): </label>
    <input type="number" id="size">
    <button id="btn">Alloca</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="script.js"></script>
  </body>
</html>
